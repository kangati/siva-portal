name: Deploy Siva Portal to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/160413454703/locations/global/workloadIdentityPools/github-pool-shoe/providers/github-provider-shoe
          service_account: github-cloudrun-deployer@mythirdproject-501311.iam.gserviceaccount.com

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy siva-portal \
            --source . \
            --region asia-south1 \
            --project mythirdproject-501311 \
            --quiet
